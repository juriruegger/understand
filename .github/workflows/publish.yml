name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Verify tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; const expected = `v${pkg.version}`; if (process.env.GITHUB_REF_NAME !== expected) { console.error(`Tag ${process.env.GITHUB_REF_NAME} does not match package version ${pkg.version}`); process.exit(1); }"

      - name: Publish to npm
        run: npm publish --provenance --access public
